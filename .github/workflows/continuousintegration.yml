name: FastAPI CI/CD

on:
  push:
    branches: [ "main", "feat/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Linting Tools
      run: |
        pip install flake8 black
    - name: Run Black (Check Formatting)
      run: black --check .
    - name: Run Flake8 (Check Style)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Tests
      run: |
        pytest test_main.py

  docker-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image for Testing
      run: |
        docker build -t test-app .
    - name: Run Tests inside Docker Container
      run: |
        docker run --rm test-app pytest test_main.py

  deploy:
    needs: [test, docker-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/minha-app-fastapi:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/minha-app-fastapi:${{ github.sha }}

  notify:
    needs: [lint, test, docker-test, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        uses: appleboy/discord-action@master
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          message: |
            🚀 **Novo evento no repositório!**
            **Workflow:** ${{ github.workflow }}
            **Status:** ${{ (needs.lint.result == 'success' && needs.test.result == 'success' && needs.docker-test.result == 'success' && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')) && '✅ Sucesso' || '❌ Falha' }}
            📦 **Repositório:** ${{ github.repository }}
            🌿 **Branch:** ${{ github.ref_name }}
            👤 **Autor:** ${{ github.actor }}
            💬 **Commit:** ${{ github.event.head_commit.message }}
            🔗 **Link:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
